<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAL Site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0C0C0F;
      --surface: #161616;
      --surface2: #1e1e1e;
      --gold: #F59E0B;
      --gold-dim: rgba(245,158,11,0.15);
      --text: #E8E6E1;
      --muted: #6b7280;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      cursor: pointer; border: none; font-family: var(--font);
      background: var(--gold); color: #000; font-weight: 600;
      padding: 0.75rem 1.5rem; border-radius: var(--radius);
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #fbbf24; }
    button:active { transform: scale(0.98); }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
    }
    header {
      border-bottom: 1px solid var(--border); padding: 1rem 0;
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    header .inner { display: flex; align-items: center; justify-content: space-between; }
    nav a { margin-left: 1.5rem; color: var(--muted); transition: color 0.2s; }
    nav a:hover { color: var(--text); text-decoration: none; }
    main { padding: 4rem 0; }
    footer { border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; color: var(--muted); font-size: 0.875rem; }
    @media (max-width: 640px) { nav { display: none; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="inner">
        <span style="font-weight:700;font-size:1.1rem;">SAL Site</span>
        <nav>
          <a href="#home">Home</a>
          <a href="#about">About</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="home" style="text-align:center;padding:4rem 0;">
        <h1 style="font-size:clamp(2rem,5vw,3.5rem);font-weight:800;margin-bottom:1rem;line-height:1.2;">
          Your Headline Here
        </h1>
        <p style="color:var(--muted);font-size:1.125rem;max-width:560px;margin:0 auto 2rem;">
          A concise description of what you do and why it matters. Replace this with your value proposition.
        </p>
        <button onclick="alert('CTA clicked!')">Get Started</button>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 SAL Site. Built with SAL™ Builder.</p>
    </div>
  </footer>

  <script>
    // JS entry point — replace with your app logic
    console.log('SAL Site ready');
  </script>
</body>
</html>
